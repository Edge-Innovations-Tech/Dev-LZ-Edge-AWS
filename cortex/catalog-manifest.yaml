apiVersion: cortex.platform/v1
kind: TerraformModuleCatalog
metadata:
  name: Dev-LZ-Edge-AWS
  provider: aws
  version: 0.1.0
  description: "AWS Cortex development landing-zone modules."
  team: platform-engineering
  contact: platform-engineering@company.com
spec:
  modules:
    - name: iam
  path: modules/iam
  cortex_output_contract: cortex_inventory
  required_tags:
    - "cortex:environment"
    - "cortex:owner"
    - "cortex:cost_center"
    - "cortex:data_classification"
  policy_bundle: policy/cortex_guardrails.rego
- name: network
  path: modules/network
  cortex_output_contract: cortex_inventory
  required_tags:
    - "cortex:environment"
    - "cortex:owner"
    - "cortex:cost_center"
    - "cortex:data_classification"
  policy_bundle: policy/cortex_guardrails.rego
- name: compute
  path: modules/compute
  cortex_output_contract: cortex_inventory
  required_tags:
    - "cortex:environment"
    - "cortex:owner"
    - "cortex:cost_center"
    - "cortex:data_classification"
  policy_bundle: policy/cortex_guardrails.rego
- name: containers
  path: modules/containers
  cortex_output_contract: cortex_inventory
  required_tags:
    - "cortex:environment"
    - "cortex:owner"
    - "cortex:cost_center"
    - "cortex:data_classification"
  policy_bundle: policy/cortex_guardrails.rego
- name: serverless
  path: modules/serverless
  cortex_output_contract: cortex_inventory
  required_tags:
