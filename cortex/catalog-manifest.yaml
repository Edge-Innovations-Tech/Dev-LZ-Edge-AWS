  required_tags:
    - "cortex:environment"
    - "cortex:owner"
    - "cortex:cost_center"
    - "cortex:data_classification"
  policy_bundle: policy/cortex_guardrails.rego
- name: cost
  path: modules/cost
  cortex_output_contract: cortex_inventory
  required_tags:
    - "cortex:environment"
    - "cortex:owner"
    - "cortex:cost_center"
    - "cortex:data_classification"
  policy_bundle: policy/cortex_guardrails.rego
  catalog_tags:
    cloud: aws
    domain: landing-zone
    environment: dev
    tier: platform
  integrations:
